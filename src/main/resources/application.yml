spring:
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
  application:
    name: marketing-agent
  datasource:
    url: ${DATABASE_URL:jdbc:h2:file:./data/marketing-agent;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH}
    username: ${DATABASE_USERNAME:sa}
    password: ${DATABASE_PASSWORD:}
    hikari:
      pool-name: marketing-agent-pool
      maximum-pool-size: ${DATABASE_MAX_POOL_SIZE:5}
      minimum-idle: ${DATABASE_MIN_IDLE:1}
      connection-timeout: 30000
      validation-timeout: 5000
      idle-timeout: 300000
      max-lifetime: 600000
      keepalive-time: 60000
      connection-test-query: SELECT 1
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    out-of-order: true
  quartz:
    job-store-type: memory
    properties:
      org:
        quartz:
          scheduler:
            instanceName: marketing-agent-scheduler
            instanceId: AUTO
          threadPool:
            threadCount: ${QUARTZ_THREAD_COUNT:5}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
          batch_size: 100
        order_inserts: true
        order_updates: true
        query:
          fail_on_pagination_over_collection_fetch: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized
  metrics:
    tags:
      application: ${spring.application.name}

server:
  port: ${PORT:8080}
  shutdown: graceful

logging:
  level:
    root: INFO
    org.hibernate.SQL: WARN
    org.springframework.security: INFO

marketing-agent:
  security:
    phone-hash-pepper: ${PHONE_HASH_PEPPER:change-me-in-production}
    api-key: ${MARKETING_AGENT_API_KEY:Press@001}
  quartz:
    broadcast-scheduler-cron: ${BROADCAST_SCHEDULER_CRON:0 */1 * * * ?}
    webhook-reconciliation-cron: ${WEBHOOK_RECONCILIATION_CRON:0 */1 * * * ?}
    daily-content-broadcast-cron: ${DAILY_CONTENT_BROADCAST_CRON:0 0 9 * * ?}
  whatsapp:
    base-url: ${WHATSAPP_BASE_URL:https://graph.facebook.com}
    api-version: ${WHATSAPP_API_VERSION:v20.0}
    access-token: ${WHATSAPP_ACCESS_TOKEN:}
    phone-number-id: ${WHATSAPP_PHONE_NUMBER_ID:}
    connect-timeout: ${WHATSAPP_CONNECT_TIMEOUT:5s}
    response-timeout: ${WHATSAPP_RESPONSE_TIMEOUT:30s}
  groq:
    base-url: ${GROQ_BASE_URL:https://api.groq.com/openai/v1}
    api-key: ${GROQ_API_KEY:placeholder_api_key}
    default-model: ${GROQ_DEFAULT_MODEL:llama-3.3-70b-versatile}
  storage:
    upload-dir: ${UPLOAD_DIR:/tmp/marketing-agent-uploads}
    s3:
      bucket: ${AWS_S3_BUCKET:}
      access-key: ${AWS_ACCESS_KEY_ID:}
      secret-key: ${AWS_SECRET_ACCESS_KEY:}
      region: ${AWS_REGION:us-east-1}
  h2:
    console:
      enabled: true
      path: /h2-console
