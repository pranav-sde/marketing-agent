services:
  - type: web
    name: marketing-agent
    runtime: java
    plan: free
    buildCommand: mvn clean package -DskipTests
    startCommand: java -Xmx450m -jar target/marketing-agent-0.1.0-SNAPSHOT.jar
    healthCheckPath: /actuator/health
    # NOTE: Set the following environment variables directly in Render Dashboard
    # under Environment > Environment Variables. Do NOT hardcode secrets here.
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_USERNAME
        sync: false
      - key: DATABASE_PASSWORD
        sync: false
      - key: MARKETING_AGENT_API_KEY
        sync: false
      - key: PHONE_HASH_PEPPER
        sync: false
      - key: WHATSAPP_ACCESS_TOKEN
        sync: false
      - key: WHATSAPP_PHONE_NUMBER_ID
        sync: false
      - key: WHATSAPP_BASE_URL
        value: https://graph.facebook.com
      - key: GROQ_API_KEY
        sync: false
      - key: AWS_S3_BUCKET
        sync: false
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_REGION
        value: ap-south-1
      - key: UPLOAD_DIR
        value: /tmp/marketing-agent-uploads
      - key: PORT
        value: "8080"
