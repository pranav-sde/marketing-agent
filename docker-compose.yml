version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: marketing_agent_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-marketing_agent_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-marketing_agent}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-marketing_agent_user} -d ${POSTGRES_DB:-marketing_agent}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: marketing_agent_app
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/${POSTGRES_DB:-marketing_agent}
      - SPRING_DATASOURCE_USERNAME=${POSTGRES_USER:-marketing_agent_user}
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD:-password}
      - MARKETING_AGENT_API_KEY=${MARKETING_AGENT_API_KEY}
      - WHATSAPP_ACCESS_TOKEN=${WHATSAPP_ACCESS_TOKEN}
      - WHATSAPP_BASE_URL=${WHATSAPP_BASE_URL}
      - GROQ_API_KEY=${GROQ_API_KEY}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./uploads:/app/uploads

volumes:
  pgdata:
